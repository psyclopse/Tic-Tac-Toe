services:
  - type: web
    name: tic-tac-toe-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix server && npm run build --prefix server
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
